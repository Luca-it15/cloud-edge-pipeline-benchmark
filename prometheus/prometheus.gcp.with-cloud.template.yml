global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: edge-api-local
    metrics_path: /metrics
    static_configs:
      - targets:
          - edge-api:8000

  - job_name: edge-api-tls-local
    scheme: https
    metrics_path: /metrics
    tls_config:
      ca_file: /certs/ca.crt
      server_name: edge-api-tls
    static_configs:
      - targets:
          - edge-api-tls:8443

  # This scrape hits Cloud Run and can cold-start or keep warm the cloud service.
  # Use it only when observing cloud pipeline metrics matters more than preserving
  # a clean cold-start latency measurement.
  - job_name: cloud-api-gcp
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets:
          - __GCP_CLOUD_HOST__:443
