services:
  certgen:
    build:
      context: ./services/certgen
    container_name: benchmark-certgen
    environment:
      CERT_DIR: /certs
    volumes:
      - ./certs:/certs

  edge-api:
    build:
      context: ./services/pipeline_api
    container_name: benchmark-edge-api
    environment:
      ROLE: edge
      SERVICE_NAME: edge-api-local
      EDGE_DEVICE_PROFILE: ward-gateway-0.5vcpu-256mb
      PORT: 8000
      CLOUD_SYNC_URL: ""
      NETWORK_UPLINK_MS: 12
      PREPROCESS_MS: 58
      INFERENCE_MS: 110
      STORAGE_MS: 0
      RESULT_PAYLOAD_RATIO: 0.05
      PIPELINE_STEP_LOGS: "true"
      SECURE_TLS_HANDSHAKE_MS: 18
      SECURE_AUTH_MS: 4
      SECURE_CRYPTO_MS_PER_MB: 7
      SECURE_REPLAY_CHECK_MS: 2
      SECURE_PACKET_OVERHEAD_KB: 2
    ports:
      - "8001:8000"
    cpus: "0.5"
    mem_limit: 256m
    pids_limit: 128
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 20

  edge-api-tls:
    build:
      context: ./services/pipeline_api
    container_name: benchmark-edge-api-tls
    environment:
      ROLE: edge
      SERVICE_NAME: edge-api-tls-local
      EDGE_DEVICE_PROFILE: ward-gateway-0.5vcpu-256mb
      PORT: 8443
      CLOUD_SYNC_URL: ""
      NETWORK_UPLINK_MS: 12
      PREPROCESS_MS: 58
      INFERENCE_MS: 110
      STORAGE_MS: 0
      RESULT_PAYLOAD_RATIO: 0.05
      PIPELINE_STEP_LOGS: "true"
      TLS_CERT_FILE: /certs/edge-api-tls.crt
      TLS_KEY_FILE: /certs/edge-api-tls.key
      TLS_CA_FILE: /certs/ca.crt
      TLS_REQUIRE_CLIENT_CERT: "false"
      SECURE_TLS_HANDSHAKE_MS: 0
      SECURE_AUTH_MS: 0
      SECURE_CRYPTO_MS_PER_MB: 0
      SECURE_REPLAY_CHECK_MS: 0
      SECURE_PACKET_OVERHEAD_KB: 0
    ports:
      - "8444:8443"
    cpus: "0.5"
    mem_limit: 256m
    pids_limit: 128
    volumes:
      - ./certs:/certs:ro
    depends_on:
      certgen:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-m", "app.healthcheck", "https://localhost:8443/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  benchmark:
    build:
      context: ./services/benchmark
    container_name: benchmark-runner
    profiles:
      - benchmark
    environment:
      CLOUD_URL: ${GCP_CLOUD_URL:?Run scripts/deploy-cloud-run.ps1 or scripts/configure-gcp-hybrid.ps1 first}/process
      EDGE_URL: http://edge-api:8000/process
      EDGE_TLS_URL: https://edge-api-tls:8443/process
      TLS_CA_FILE: /certs/ca.crt
      DATASET_PATH: /app/data/patients.json
      DATASET_REPEATS: 3
      COMPLEXITY: 1.0
      OUTPUT_DIR: /app/results
      REQUEST_TIMEOUT_SECONDS: 90
      BENCHMARK_SCENARIOS: cloud,edge,edge_tls
    volumes:
      - ./results:/app/results
      - ./certs:/certs:ro
      - ./data:/app/data:ro
    depends_on:
      edge-api:
        condition: service_healthy
      edge-api-tls:
        condition: service_healthy

  benchmark-api:
    build:
      context: ./services
      dockerfile: benchmark_api/Dockerfile
    container_name: benchmark-control-api
    environment:
      PORT: 8090
      CLOUD_URL: ${GCP_CLOUD_URL:?Run scripts/deploy-cloud-run.ps1 or scripts/configure-gcp-hybrid.ps1 first}/process
      EDGE_URL: http://edge-api:8000/process
      EDGE_TLS_URL: https://edge-api-tls:8443/process
      TLS_CA_FILE: /certs/ca.crt
      DATASET_PATH: /app/data/patients.json
      DATASET_REPEATS: 3
      COMPLEXITY: 1.0
      OUTPUT_DIR: /app/results
      REQUEST_TIMEOUT_SECONDS: 90
      BENCHMARK_SCENARIOS: cloud,edge,edge_tls
    volumes:
      - ./results:/app/results
      - ./certs:/certs:ro
      - ./data:/app/data:ro
    ports:
      - "8090:8090"
    depends_on:
      edge-api:
        condition: service_healthy
      edge-api-tls:
        condition: service_healthy

  hospital-dashboard:
    build:
      context: ./services/hospital_dashboard
    container_name: benchmark-hospital-dashboard
    environment:
      DATASET_PATH: /app/data/patients.json
      RESULTS_PATH: /app/results/patient_results.json
      BENCHMARK_API_URL: http://benchmark-api:8090
      PORT: 8080
    volumes:
      - ./data:/app/data:ro
      - ./results:/app/results:ro
    ports:
      - "8080:8080"
    depends_on:
      - benchmark-api

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: benchmark-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./prometheus/prometheus.gcp.yml:/etc/prometheus/prometheus.yml:ro
      - ./certs:/certs:ro
    ports:
      - "9090:9090"
    depends_on:
      edge-api:
        condition: service_healthy
      edge-api-tls:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.0
    container_name: benchmark-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
