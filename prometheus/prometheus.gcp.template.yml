global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: edge-api-local
    metrics_path: /metrics
    static_configs:
      - targets:
          - edge-api:8000

  - job_name: cloud-api-gcp
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets:
          - __GCP_CLOUD_HOST__:443
